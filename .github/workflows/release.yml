name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          cd target/release
          tar czf lycan-${GITHUB_REF_NAME}-x86_64-linux.tar.gz lycan
          sha256sum lycan-${GITHUB_REF_NAME}-x86_64-linux.tar.gz > lycan-${GITHUB_REF_NAME}-x86_64-linux.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/lycan-*-x86_64-linux.tar.gz
            target/release/lycan-*-x86_64-linux.tar.gz.sha256
